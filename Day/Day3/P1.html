<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html tables</title>
</head>
<body>
    <p>HTML Tables</p>
    <p>tr: table row
       th: table header
       td: table data
    </p>
    <table border="1"> 
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>Jun</td>
            <td>5000</td>
        </tr>
        <tr>
            <td>Jul</td>
            <td>7000</td>
        </tr>
    </table>
</body>
</html>
